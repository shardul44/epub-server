<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"><html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Chapter 1</title>
  <style type="text/css">
    /* Basic Styles */
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .-epub-media-overlay-active {
      fill: #2196F3 !important;
      color: #2196F3 !important;
    }
    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: block;
      page-break-after: always;
    }
    .canvas-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .draggable-text-block {
      position: absolute;
      z-index: 10;
      cursor: move;
      padding: 0;
      margin: 0;
    }
    .image-drop-zone, .image-placeholder {
      background: transparent;
      border: none;
      display: block;
      position: absolute;
    }
    .image-drop-zone img, .image-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Audio Sync Styles */
    .paragraph-block {
      margin: 0;
    }
    .sync-sentence {
      display: inline;
    }
    .sync-word {
      display: inline;
    }
  </style>
</head>
<body>
  <div class="page" id="chapter1_page1">
    
    <!-- Blue Header Background -->
    <div id="chapter1_page1_div1" style="position: absolute; top: 0%; left: 0%; width: 100%; height: 15.5%; background-color: #4285F4; z-index: 1;"></div>

    <!-- Metronome Logo -->
    <div class="image-drop-zone" id="chapter1_page1_img1" title="METRONOME logo" style="position: absolute; top: 4.5%; left: 4.8%; width: 22.5%; height: 6.2%; z-index: 5;"></div>

    <!-- Growth Over Time Report Title -->
    <div class="draggable-text-block" style="position: absolute; top: 6.5%; left: 36.5%; width: 30%; z-index: 10; color: white; font-size: 1.8em; font-weight: bold;" id="chapter1_page1_div2" data-read-aloud="true">
      <h1 id="chapter1_h1" data-read-aloud="true">
        <span class="sync-sentence" id="chapter1_h1_s1" data-read-aloud="true">
          <span class="sync-word" id="chapter1_h1_s1_w1">Growth</span>
          <span class="sync-word" id="chapter1_h1_s1_w2">Over</span>
          <span class="sync-word" id="chapter1_h1_s1_w3">Time</span>
          <span class="sync-word" id="chapter1_h1_s1_w4">Report</span>
        </span>
      </h1>
    </div>

    <!-- Report Filters Section -->
    <div class="draggable-text-block" style="position: absolute; top: 22%; left: 4.8%; width: 20%; z-index: 10; font-size: 1.5em; font-weight: bold;" id="chapter1_page1_div3" data-read-aloud="true">
      <h2 id="chapter1_h2" data-read-aloud="true">
        <span class="sync-sentence" id="chapter1_h2_s1" data-read-aloud="true">
          <span class="sync-word" id="chapter1_h2_s1_w1">Report</span>
          <span class="sync-word" id="chapter1_h2_s1_w2">Filters</span>
        </span>
      </h2>
    </div>
    <div class="draggable-text-block" style="position: absolute; top: 26.5%; left: 4.8%; width: 20%; z-index: 10; font-size: 1.1em;" id="chapter1_page1_div4" data-read-aloud="true">
      <p id="chapter1_page1_p1" class="paragraph-block" data-read-aloud="true">
        <span class="sync-sentence" id="chapter1_page1_p1_s1" data-read-aloud="true">
          <span class="sync-word" id="chapter1_page1_p1_s1_w1">Subject:</span>
          <span class="sync-word" id="chapter1_page1_p1_s1_w2">All</span>
          <span class="sync-word" id="chapter1_page1_p1_s1_w3">Subjects</span>
        </span>
      </p>
    </div>

    <!-- Footer -->
    <div class="draggable-text-block" style="position: absolute; top: 94%; left: 0; width: 100%; z-index: 10; text-align: center; color: #888888; font-size: 0.9em;" id="chapter1_page1_div5" data-read-aloud="true">
      <footer id="chapter1_page1_footer1" data-read-aloud="true">
        <span class="sync-sentence" id="chapter1_page1_footer1_s1" data-read-aloud="true">
          <span class="sync-word" id="chapter1_page1_footer1_s1_w1">Page</span>
          <span class="sync-word" id="chapter1_page1_footer1_s1_w2">1</span>
          <span class="sync-word" id="chapter1_page1_footer1_s1_w3">of</span>
          <span class="sync-word" id="chapter1_page1_footer1_s1_w4">3</span>
          <span class="sync-word" id="chapter1_page1_footer1_s1_w5">|</span>
          <span class="sync-word" id="chapter1_page1_footer1_s1_w6">Generated</span>
          <span class="sync-word" id="chapter1_page1_footer1_s1_w7">on</span>
          <span class="sync-word" id="chapter1_page1_footer1_s1_w8">16/4/2026</span>
        </span>
      </footer>
    </div>

  </div>
</body>
</html>
