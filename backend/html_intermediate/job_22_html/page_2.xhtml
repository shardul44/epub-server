<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"><html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Chapter 2</title>
  <style type="text/css">
    /* Basic Styles */
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #f8f9fa;
    }
    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: block;
      overflow: hidden;
    }
    /* EPUB Media Overlay */
    .-epub-media-overlay-active {
      fill: #2196F3 !important;
      color: #2196F3 !important;
    }
    /* Text Hierarchy */
    .paragraph-block {
      margin: 1em 0;
    }
    .sync-sentence, .sync-word {
      display: inline;
    }
    /* Layout Elements */
    .draggable-text-block {
      position: absolute;
      z-index: 10;
      cursor: move;
      padding: 0;
      margin: 0;
    }
    .image-drop-zone, .image-placeholder {
      background: transparent;
      border: none;
      display: block;
      position: absolute;
      z-index: 5;
    }
    .chart-container {
      position: absolute;
      background-color: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 0.5em;
      box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    }
    h2.chart-title {
      font-size: 1.5em;
      font-weight: 600;
      color: #212529;
      margin: 0;
    }
    p.chart-subtitle {
      font-size: 1em;
      color: #6c757d;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="page" id="chapter2_page2">
    
    <!-- Completion Rate Trend Chart Section -->
    <div class="chart-container" id="chapter2_page2_div1" style="top: 6%; left: 6%; width: 88%; height: 38%;">
      <div class="draggable-text-block" id="chapter2_page2_div2" style="top: 5%; left: 3%; width: 94%;">
        <h2 class="chart-title" id="chapter2_h1" data-read-aloud="true">
          <span class="sync-sentence" id="chapter2_h1_s1" data-read-aloud="true">
            <span class="sync-word" id="chapter2_h1_s1_w1">Completion</span>
            <span class="sync-word" id="chapter2_h1_s1_w2">Rate</span>
            <span class="sync-word" id="chapter2_h1_s1_w3">Trend</span>
          </span>
        </h2>
      </div>
      <div class="draggable-text-block" id="chapter2_page2_div3" style="top: 18%; left: 3%; width: 94%;">
        <p class="chart-subtitle paragraph-block" id="chapter2_page2_p1" data-read-aloud="true">
          <span class="sync-sentence" id="chapter2_page2_p1_s1" data-read-aloud="true">
            <span class="sync-word" id="chapter2_page2_p1_s1_w1">Cumulative</span>
            <span class="sync-word" id="chapter2_page2_p1_s1_w2">share</span>
            <span class="sync-word" id="chapter2_page2_p1_s1_w3">of</span>
            <span class="sync-word" id="chapter2_page2_p1_s1_w4">student</span>
            <span class="sync-word" id="chapter2_page2_p1_s1_w5">slots</span>
            <span class="sync-word" id="chapter2_page2_p1_s1_w6">completed</span>
            <span class="sync-word" id="chapter2_page2_p1_s1_w7">over</span>
            <span class="sync-word" id="chapter2_page2_p1_s1_w8">time.</span>
          </span>
        </p>
      </div>
      <div class="image-drop-zone" id="chapter2_page2_img1" title="Line chart showing completion rate trend over time. The line is flat at zero." style="top: 25%; left: 3%; width: 94%; height: 70%;"></div>
    </div>

    <!-- Participation Analysis Chart Section -->
    <div class="chart-container" id="chapter2_page2_div4" style="top: 48%; left: 6%; width: 88%; height: 46%;">
      <div class="draggable-text-block" id="chapter2_page2_div5" style="top: 4%; left: 3%; width: 94%;">
        <h2 class="chart-title" id="chapter2_h2" data-read-aloud="true">
          <span class="sync-sentence" id="chapter2_h2_s1" data-read-aloud="true">
            <span class="sync-word" id="chapter2_h2_s1_w1">Participation</span>
            <span class="sync-word" id="chapter2_h2_s1_w2">Analysis</span>
          </span>
        </h2>
      </div>
      <div class="draggable-text-block" id="chapter2_page2_div6" style="top: 15%; left: 3%; width: 94%;">
        <p class="chart-subtitle paragraph-block" id="chapter2_page2_p2" data-read-aloud="true">
          <span class="sync-sentence" id="chapter2_page2_p2_s1" data-read-aloud="true">
            <span class="sync-word" id="chapter2_page2_p2_s1_w1">Lower</span>
            <span class="sync-word" id="chapter2_page2_p2_s1_w2">bars</span>
            <span class="sync-word" id="chapter2_page2_p2_s1_w3">may</span>
            <span class="sync-word" id="chapter2_page2_p2_s1_w4">indicate</span>
            <span class="sync-word" id="chapter2_page2_p2_s1_w5">engagement</span>
            <span class="sync-word" id="chapter2_page2_p2_s1_w6">risk.</span>
          </span>
        </p>
      </div>
      <div class="image-drop-zone" id="chapter2_page2_img2" title="Bar chart showing participation analysis. Several orange bars of varying heights represent different activities." style="top: 22%; left: 3%; width: 94%; height: 75%;"></div>
    </div>

  </div>
</body>
</html>
