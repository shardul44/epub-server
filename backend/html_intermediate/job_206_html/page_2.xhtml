    /* Reflowable EPUB Styles */
    @page {
      margin: 0;
      padding: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      max-width: none;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: serif;
      max-width: none;
      overflow-x: hidden;
      overflow-y: auto;
    }
    
    .page, .container {
      position: relative !important;
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      min-height: 100vh !important; /* Ensure minimum height but allow growth */
      display: block !important;
      flex-direction: column !important;
      overflow: visible !important;
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box !important;
    }

    /* Force full-bleed media regardless of older inline/page CSS */
    .page> .has-image,
    .container> .has-image,
    .page> .image-drop-zone,
    .container> .image-drop-zone {
      max-width: none !important;
    }
    
    img {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      display: block !important;
      margin: 0 auto !important;
      object-fit: cover !important;
    }
    
    .image-placeholder, .image-drop-zone {

      padding: 1em;
      text-align: center;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .image-placeholder:hover, .image-drop-zone:hover {
      border-color: #4CAF50;
      background-color: #f0f8f0;
    }
    
    .image-placeholder.drag-over, .image-drop-zone.drag-over {
      border-color: #2196F3;
      background-color: #e3f2fd;
    }
